##General##
profile=gpu-hq
gpu-api=vulkan
hwdec=auto-copy
contrast=-2
brightness=-1
gamma=-1
saturation=1

##Tweaks##
msg-color
term-osd-bar
script-opts=osc-layout=box,osc-seekbarstyle=bar
force-window=yes

osd-font-size=20
osd-color='#CCFFFFFF'
osd-border-color='#DD322640'
osd-bar-align-y=0
osd-border-size=2
osd-bar-h=2
osd-bar-w=60

keep-open=always
reset-on-next-file=pause
save-position-on-quit=yes
autofit=70%
force-seekable=yes
osd-bar=no
cursor-autohide=300

##Audio/Subs Priority##
alang=ja,jp,jpn,en,eng
slang=en,eng,enUS

##Audio##
volume=100
volume-max=100
audio-file-auto=fuzzy

##Subs##
demuxer-mkv-subtitle-preroll=yes
sub-ass-vsfilter-blur-compat=yes
sub-fix-timing=yes
sub-auto=fuzzy
sub-gauss=1.0
sub-gray=yes

#Some settings overwritting the default Arial for .srt subtitles (or .ass if you force it)
sub-font=Andika New Basic Bold
sub-font-size=52
sub-blur=0.2
sub-border-color=0.0/0.0/0.0/1.0
sub-border-size=3.0
sub-color=1.0/1.0/1.0/1.0
sub-margin-x=100
sub-margin-y=50
sub-shadow-color=0.0/0.0/0.0/0.25
sub-shadow-offset=0

##Screenshots##
screenshot-format=png
screenshot-high-bit-depth=no
screenshot-png-compression=7
screenshot-template='~/Pictures/MPV/%F (%p) %n'

##Dither##
dither-depth=auto
dither=error-diffusion
error-diffusion=floyd-steinberg

##Deband##
deband=yes
deband-iterations=4
deband-threshold=48
deband-range=16
deband-grain=5

##Scalers & Shaders##
glsl-shaders-append="~~/shaders/SSimSuperRes.glsl"
glsl-shaders-append="~~/shaders/KrigBilateral.glsl"

glsl-shaders-append="~~/shaders/Anime4K/Anime4K_Denoise_Bilateral_Mean.glsl"
glsl-shaders-append="~~/shaders/Anime4K/Anime4K_Deblur_DoG.glsl"

glsl-shaders-append="~~/shaders/antiring.hook"

glsl-shaders-append="~~/shaders/mpv-prescalers/vulkan/ravu-r4.hook"
glsl-shaders-append="~~/shaders/mpv-prescalers/vulkan/ravu-lite-r4.hook"

glsl-shaders-append="~~/shaders/Anime4K/Anime4K_DarkLines_HQ.glsl"

scale=ewa_lanczossharp

cscale=ewa_lanczossharp

glsl-shader="~~/shaders/SSimDownscaler.glsl"
dscale=mitchell

fbo-format=rgba16hf
no-scaler-resizes-only
