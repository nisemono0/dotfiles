WHEEL_UP add volume +5
WHEEL_DOWN add volume -5

CTRL+WHEEL_UP seek +5
CTRL+WHEEL_DOWN seek -5

SHIFT+WHEEL_UP frame-step
SHIFT+WHEEL_DOWN frame-back-step

CTRL+1 change-list glsl-shaders toggle "~~/shaders/Anime4K/Anime4K_DarkLines_HQ.glsl"; show-text "Line darkening toggle"
CTRL+2 change-list glsl-shaders toggle "~~/shaders/Anime4K/Anime4K_ThinLines_HQ.glsl"; show-text "Line thinning toggle"

CTRL+9 change-list glsl-shaders set "~~/shaders/SSimSuperRes.glsl:~~/shaders/KrigBilateral.glsl:~~/shaders/Anime4K/Anime4K_Deblur_DoG.glsl:~~/shaders/Anime4K/Anime4K_Denoise_Bilateral_Mode.glsl:~~/shaders/antiring.hook:~~/shaders/mpv-prescalers/vulkan/ravu-r4.hook:~~/shaders/mpv-prescalers/vulkan/ravu-lite-r4.hook:~~/shaders/Anime4K/Anime4K_DarkLines_HQ.glsl:~~/shaders/SSimDownscaler.glsl"; show-text "Shaders set"
CTRL+0 change-list glsl-shaders clr ""; show-text "Shaders cleared"

c show-text "${chapter-list}" 1700